<!Doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="ISO-8859-1">
	<title>Insert Title here</title>

</head>

<body>
	<section>
		<div class="container admin-page">
			<div class="row">
				<div class="col-lg-6 col-md-9 mx-auto">
					<div class="admin-card">
						<div class="admin-card-header">
							<h3>Edit Product</h3>
							<th:block th:if="${session.succMsg}">
								<p class="text-success fw-bold">[[${session.succMsg}]]</p>
								<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>

							<th:block th:if="${session.errorMsg}">
								<p class="text-danger fw-bold">[[${session.errorMsg}]]</p>
								<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>
						</div>



						<div class="admin-card-body">
							<form action="/admin/updateProduct" method="post" enctype="multipart/form-data">
								<input type="hidden" name="id" th:value="${product.id}">
								<div class="mb-3">
									<label>Enter Title</label>
									<input type="text" name="title" th:value="${product.title}" class="form-control">
								</div>

								<div class="mb-3">
									<label>Enter Description</label>
									<textarea rows="3" cols="" class="form-control"
										name="description">[[${product.description}]]</textarea>
								</div>

								<div class="row">
									<div class="mb-3 col">
										<label>Category</label>
									<select class="form-control" name="category">
											<option>[[${product.category}]]</option>
											<option th:each="c:${categories}">[[${c.name}]]</option>
										</select>  	
										
										
									</div>

									<div class="mb-3 col">
										<label>Enter Price</label>
										<input type="number" name="price" th:value="${product.price}"
											class="form-control">
									</div>
								</div>

								<div class="row">
									<div class="mb-3 col">
										<label>Discount</label>
										<input type="number" name="discount" th:value="${product.discount}"
											class="form-control">
									</div>

									<div class="mb-3 col">
										<label>Discount Price</label>
										<input type="number" readonly th:value="${product.discountPrice}"
											class="form-control">
									</div>
								</div>
								<div class="mb-3">
									<label>Status</label>
									<div class="form-check">
										<input class="form-check-input" type="radio"
											th:checked="${product.isActive==true}" value="true" name="isActive"
											id="flexRadioDefault1">
										<label class="form-check-label" for="flexRadioDefault1">
											Active
										</label>
									</div>
									<div class="form-check">
										<input class="form-check-input" type="radio" name="isActive"
											th:checked="${product.isActive==false}" value="false"
											id="flexRadioDefault2">
										<label class="form-check-label" for="flexRadioDefault2">
											Inactive
										</label>
									</div>
								</div>

								<div class="row">
									<div class="mb-3 col">
										<label>Enter Stock</label>
										<input type="text" name="stock" th:value="${product.stock}"
											class="form-control">
									</div>

									<div class="mb-3 col">
										<label>Upload Image</label>
										<input type="file" name="file" class="form-control">
									</div>
									<div class="mt-1">
										<div class="admin-image-preview text-center mt-3">
											<!-- @{'/uploads/Product/'+${product.image}} -->
											<img th:src="${imageHelper.getProductImageUrl(product.image)}"
												class="img-fluid rounded" style="max-width:160px;">
										</div>
									</div>
								</div>
								<button class="admin-btn w-100">Update</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>

</html>
