<!Doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="ISO-8859-1">
    <title>My Reviews</title>
	
	
</head>

<body>
    <section>
        <div class="container profile-container mt-5">
            <div class="row">
                <div class="col-md-10 offset-md-1">
                    <p class="user-page-title">My Reviews</p>
                    
                    <th:block th:if="${session.succMsg}">
                        <p class="text-success fw-bold text-center">[[${session.succMsg}]]</p>
                        <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                    </th:block>
                    
                    <hr>
                    
                    <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-5">
                        <i class="fa-regular fa-star fa-4x text-muted mb-3"></i>
                        <h4>No Reviews Yet</h4>
                        <p>You haven't written any reviews yet. Go to products and share your experience!</p>
                        <a href="/products" class="btn btn-primary mt-3">Browse Products</a>
                    </div>
                    
                    <div th:each="review : ${reviews}" class="my-review-card">
                        <div class="row">
                            <div class="col-md-2 text-center">
								<!-- @{'/uploads/Product/'+${review.product.image}} -->
                                <img th:src="${imageHelper.getProductImageUrl(review.product.image)}" 
                                     style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px;">
                            </div>
                            <div class="col-md-7">
                                <h5>
                                    <a th:href="@{'/product/'+${review.product.id}}" 
                                       class="text-decoration-none">
                                        [[${review.product.title}]]
                                    </a>
                                </h5>
                <!--                <div class="mb-2">
                                    <span th:each="i,stat: ${#numbers.sequence(1, review.rating)}">
                                        <i class="fa-solid fa-star text-warning"></i>
                                    </span>
                                    <span th:each="i,stat: ${#numbers.sequence(review.rating+1, 5)}">
                                        <i class="fa-regular fa-star text-muted"></i>
                                    </span>
                                </div>  -->
								
								<div class="mb-2">

								    <!-- Filled Stars -->
								    <span th:each="i : ${#numbers.sequence(1, review.rating)}">
								        <i class="fa-solid fa-star text-warning"></i>
								    </span>

								    <!-- Empty Stars -->
								    <span th:if="${review.rating < 5}"
								          th:each="i : ${#numbers.sequence(1, 5 - review.rating)}">
								        <i class="fa-regular fa-star text-muted"></i>
								    </span>

								</div>
								
                                <p class="mb-1">[[${review.reviewText}]]</p>
                                <small class="text-muted">Posted on: [[${#temporals.format(review.reviewDate, 'dd MMM yyyy')}]]</small>
                            </div>
                            <div class="col-md-3 text-end">
                                <a th:href="@{'/user/delete-review/'+${review.id}}" 
                                   class="btn delete-review-btn"
                                   onclick="return confirm('Are you sure you want to delete this review?')">
                                    <i class="fa-solid fa-trash"></i> Delete
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
