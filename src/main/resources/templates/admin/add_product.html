<!Doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="ISO-8859-1">
	<title>Insert Title here</title>

</head>

<body>
	<section>
		<div class="container admin-page">
			<div class="row">
				<div class="col-md-6 offset-md-3">
					<div class="admin-card">
						<div class="admin-card-header">
							<h3>Add Product</h3>
							<th:block th:if="${session.succMsg}">
								<p class="mt-2">[[${session.succMsg}]]</p>
								<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>

							<th:block th:if="${session.errorMsg}">
								<p class="mt-2">[[${session.errorMsg}]]</p>
								<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>
						</div>



						<div class="admin-card-body">
							<form action="/admin/saveProduct" method="post" enctype="multipart/form-data">
								<div class="mb-3">
									<label>Enter Title</label>
									<input type="text" name="title" class="form-control">
								</div>

								<div class="mb-3">
									<label>Enter Description</label>
									<textarea rows="3" cols="" class="form-control" name="description"></textarea>
								</div>

								<div class="mb-3">
									<label>Category</label>
									<select class="form-control" name="category">
										<option>--select--</option>
										<option th:each="c:${categories}">[[${c.name}]]</option>
									</select>
								</div>

								<div class="mb-3">
									<label>Enter Price</label>
									<input type="number" name="price" class="form-control">
								</div>
								<div class="mb-3">
									<label>Status</label>
									<div class="form-check">
										<input class="form-check-input" type="radio" checked value="true"
											name="isActive" id="radioDefault1">
										<label class="form-check-label" for="radioDefault1">
											Active
										</label>
									</div>
									<div class="form-check">
										<input class="form-check-input" type="radio" name="isActive" value="false"
											id="radioDefault2">
										<label class="form-check-label" for="radioDefault2">
											Inactive
										</label>
									</div>
								</div>

								<div class="row">
									<div class="mb-3 col">
										<label>Enter Stock</label>
										<input type="text" name="stock" class="form-control">
									</div>

									<div class="mb-3 col">
										<label>Upload Image</label>
										<input type="file" name="file" class="form-control">
									</div>

								</div>
								<button class="admin-btn w-100">Submit</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>

</html>
