<!Doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="ISO-8859-1">
	<title>Insert Title here</title>

</head>

<body>
	<section>
		<div class="container admin-page">
			<div class="row">
				<div class="col-lg-5 col-md-7 mx-auto">
					<div class="admin-card">
						<div class="admin-card-header">
							<h3>Edit Category</h3>
							<th:block th:if="${session.succMsg}">
								<p class="text-success fw-bold">[[${session.succMsg}]]</p>
								<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>

							<th:block th:if="${session.errorMsg}">
								<p class="text-danger fw-bold">[[${session.errorMsg}]]</p>
								<th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
							</th:block>

						</div>

						<div class="admin-card-body">
							<form action="/admin/updateCategory" method="post" enctype="multipart/form-data">
								<input type="hidden" name="id" th:value="${category.id}">
								<div class="mb-3">
									<label>Enter Category</label>
									<input type="text" name="name" th:value="${category.name}" class="form-control">
								</div>

								<div class="mb-3">
									<label>Status</label>
									<div class="form-check">
										<input class="form-check-input" type="radio"
											th:checked="${category.isActive==true}" value="true" name="isActive"
											id="flexRadioDefault1">
										<label class="form-check-label" for="flexRadioDefault1">
											Active
										</label>
									</div>
									<div class="form-check">
										<input class="form-check-input" type="radio" name="isActive"
											th:checked="${category.isActive==false}" value="false" id="flexRadioDefault2">
										<label class="form-check-label" for="flexRadioDefault2">
											Inactive
										</label>
									</div>
								</div>

								<div class="mb-3">
									<label>Upload Image</label>
									<input type="file" name="file" class="form-control">
								</div>
								<div class="admin-image-preview text-center mb-3">
									<!-- @{'/uploads/Category_img/'+${category.imageName}} -->
								<img th:src="${imageHelper.getCategoryImageUrl(category.imageName)}" width="100px"
									height="100px"> </div>
								<button class="admin-btn w-100">Update</button>
							</form>
						</div>
					</div>

				</div>


			</div>
		</div>
	</section>
</body>

</html>
